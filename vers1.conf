server{
	listen	127.0.0.1:9658
	listen	127.0.0.1:9650
	root	/home/aamraouy/webserver/web-server
	index pal.jpg amro.html;
	location /{
		#route /
		root /home/aamraouy/webserver/web-server 
		index	test.html;
		error	/default_err_pages;
		clientBodyMaxSize	10}
	location .py{
		#route .py
		root	/usr/share/nginx/html
		index	index.html;
		#cgi	/home/am;
	}
	location /images{
		#route /images/
		root	/home/aamraouy/webserver/web-server
		index	pal.jpg  ima.jpeg;
		error 404 errnor.html;
		#limit_except GET{
		#	deny all
		#}
		autoindex on
	}
		#proxy_pass 
		#proxy_http_version 1.1
	return 404
}

